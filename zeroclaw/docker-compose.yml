services:
  zeroclaw:
    image: ghcr.io/zeroclaw-labs/zeroclaw:debian
    restart: unless-stopped
    expose:
      - "42617"   # gateway
    volumes:
      - ./data:/zeroclaw-data
      - ./config.toml:/zeroclaw-data/.zeroclaw/config.toml:ro
    environment:
      ZEROCLAW_ALLOW_PUBLIC_BIND: "1"
      ZEROCLAW_providers__models__custom__cloud__api_key: "${MODEL_API_KEY}"