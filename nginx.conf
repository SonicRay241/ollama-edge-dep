events {
    worker_connections 1024;
}

http {
    lua_shared_dict api_keys 1m;

    init_by_lua_block {
        local api_keys_str = os.getenv("API_KEYS") or ""
        local keys = {}
        for key in string.gmatch(api_keys_str, "([^,]+)") do
            local trimmed = string.match(key, "^%s*(.-)%s*$")
            if trimmed and trimmed ~= "" then
                table.insert(keys, trimmed)
            end
        end
        ngx.shared.api_keys:set("keys", keys)
    }

    server {
        listen 80;

        location / {
            set $authorized false;
            set $api_key "";

            access_by_lua_block {
                local keys = ngx.shared.api_keys:get("keys")
                local auth_header = ngx.var.http_authorization

                if auth_header then
                    local token = string.match(auth_header, "^Bearer%s+(.+)$")
                    if token then
                        for _, key in ipairs(keys or {}) do
                            if key == token then
                                ngx.var.authorized = "true"
                                ngx.var.api_key = key
                                break
                            end
                        end
                    end
                end

                if ngx.var.authorized ~= "true" then
                    ngx.header["WWW-Authenticate"] = 'Bearer realm="API"'
                    ngx.status = 401
                    ngx.say("Unauthorized")
                    ngx.exit(401)
                end
            }

            proxy_pass http://ollama:11434;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }
    }
}