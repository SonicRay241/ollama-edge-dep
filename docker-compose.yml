services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped

    expose:
      - "11434"

    environment:
      OLLAMA_HOST: "0.0.0.0"
      OLLAMA_CONTEXT_LENGTH: ${OLLAMA_CONTEXT_LENGTH:-131072}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY}

    volumes:
      - ollama_data:/root/.ollama

    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  nginx:
    image: nginx:alpine
    restart: unless-stopped
  
    depends_on:
      ollama:
        condition: service_healthy
  
    expose:
      - "80"
  
    environment:
      API_KEYS: ${API_KEYS}
  
    command: >
      /bin/sh -c '
      set -eux;
  
      CONFIG=/etc/nginx/conf.d/default.conf;
  
      echo "map \$\$http_authorization \$\$auth_ok {" > $$CONFIG;
      echo "    default 0;" >> $$CONFIG;
  
      OLDIFS="$$IFS";
      IFS=",";
  
      for key in $$API_KEYS; do
        echo "    ~^Bearer\\\\ $$key\\$$ 1;" >> $$CONFIG;
      done;
  
      IFS="$$OLDIFS";
  
      echo "}" >> $$CONFIG;
  
      echo "server {" >> $$CONFIG;
      echo "    listen 80;" >> $$CONFIG;
  
      echo "    location / {" >> $$CONFIG;
  
      echo "        if (\$\$auth_ok = 0) {" >> $$CONFIG;
      echo "            return 401;" >> $$CONFIG;
      echo "        }" >> $$CONFIG;
  
      echo "        proxy_pass http://ollama:11434;" >> $$CONFIG;
  
      echo "        proxy_http_version 1.1;" >> $$CONFIG;
  
      echo "        proxy_buffering off;" >> $$CONFIG;
      echo "        proxy_request_buffering off;" >> $$CONFIG;
  
      echo "        proxy_set_header Host \$\$host;" >> $$CONFIG;
      echo "        proxy_set_header Connection \"\";" >> $$CONFIG;
  
      echo "        proxy_read_timeout 3600s;" >> $$CONFIG;
      echo "        proxy_send_timeout 3600s;" >> $$CONFIG;
  
      echo "    }" >> $$CONFIG;
      echo "}" >> $$CONFIG;
  
      echo "=== GENERATED CONFIG ===";
      cat $$CONFIG;
  
      nginx -t;
  
      exec nginx -g "daemon off;";
      '

volumes:
  ollama_data: