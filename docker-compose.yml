services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped

    expose:
      - "11434"

    environment:
      OLLAMA_HOST: "0.0.0.0"
      OLLAMA_CONTEXT_LENGTH: ${OLLAMA_CONTEXT_LENGTH:-131072}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY}

    volumes:
      - ollama_data:/root/.ollama

    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  proxy:
    image: oven/bun:1-alpine
    restart: unless-stopped
    command: ["bun", "run", "/app/auth.ts"]
    working_dir: /app
    expose:
      - "8080"
    volumes:
      - ./auth.ts:/app/auth.ts:ro
    environment:
      - OLLAMA_URL=http://ollama:11434
      - API_KEYS=${API_KEYS}
    depends_on:
      - ollama

volumes:
  ollama_data: