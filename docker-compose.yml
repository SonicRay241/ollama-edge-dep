services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped

    expose:
      - "11434"

    environment:
      OLLAMA_HOST: "0.0.0.0"
      OLLAMA_CONTEXT_LENGTH: ${OLLAMA_CONTEXT_LENGTH:-131072}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY}

    volumes:
      - ollama_data:/root/.ollama

    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  nginx:
    image: openresty/openresty:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - API_KEYS=${API_KEYS}
    depends_on:
      - ollama
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        cat > /usr/local/openresty/nginx/conf/nginx.conf << 'EOF'
        events {
            worker_connections 1024;
        }
        
        http {
            include /etc/nginx/conf.d/*.conf;
            server {
                listen 80;
        
                location / {
                    access_by_lua_block {
                        local api_keys_str = os.getenv("API_KEYS") or ""
                        local authorized = false
        
                        for key in string.gmatch(api_keys_str, "([^,]+)") do
                            local trimmed = string.match(key, "^%s*(.-)%s*$")
                            if trimmed and trimmed ~= "" then
                                local auth_header = ngx.var.http_authorization
                                if auth_header then
                                    local token = string.match(auth_header, "^Bearer%s+(.+)$")
                                    if token and token == trimmed then
                                        authorized = true
                                        break
                                    end
                                end
                            end
                        end
        
                        if not authorized then
                            ngx.header["WWW-Authenticate"] = 'Bearer realm="API"'
                            ngx.status = 401
                            ngx.say("Unauthorized")
                            ngx.exit(401)
                        end
                    }
        
                    proxy_pass http://ollama:11434;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_set_header Authorization $http_authorization;
                }
            }
        }
        EOF
        /usr/local/openresty/nginx/sbin/nginx -g "daemon off;"

volumes:
  ollama_data: