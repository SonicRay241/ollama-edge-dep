services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped

    expose:
      - "11434"

    environment:
      OLLAMA_HOST: "0.0.0.0"
      OLLAMA_CONTEXT_LENGTH: ${OLLAMA_CONTEXT_LENGTH:-131072}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY}

    volumes:
      - ollama_data:/root/.ollama

    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  nginx:
    image: nginx:alpine
    restart: unless-stopped

    depends_on:
      ollama:
        condition: service_healthy

    expose:
      - "80"

    environment:
      API_KEYS: ${API_KEYS}

    volumes:
      - ./entrypoint.sh:/usr/local/bin/entrypoint.sh:ro

    command: ["/usr/local/bin/entrypoint.sh"]

    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  ollama_data: